<div class="container-fluid p-4">

  <div class="d-flex justify-content-between align-items-center mb-4">

    <h2>
      Productos
    </h2>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productoModal">
      + Nuevo Producto
    </button>

    <div class="mt-3">

      <input type="text" class="form-control" placeholder="Buscar producto..." [(ngModel)]="buscarTexto">

    </div>

  </div>

  <div class="card shadow">

    <div class="card-body">

      <table class="table table-hover">

        <thead class="table-dark">

          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
          </tr>

        </thead>

        <tbody>

          @for(producto of productosFiltrados; track producto.id){

          <tr>

            <td>{{ producto.id }}</td>

            <td>{{ producto.nombre }}</td>

            <td>
              S/ {{ producto.precio }}
            </td>

            <td>
              {{ producto.stock }}
            </td>

            <td>

              <button class="btn btn-warning btn-sm me-2" (click)="editarProducto(producto)">
                Editar
              </button>

              <button class="btn btn-danger btn-sm" (click)="eliminarProducto(producto.id)">
                Eliminar
              </button>

            </td>

          </tr>

          }

        </tbody>

      </table>

    </div>

  </div>

</div>

<div
    class="modal fade"
    id="productoModal"
    tabindex="-1"
>

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    {{ editandoId ? 'Editar Producto' : 'Nuevo Producto' }}

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                ></button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label class="form-label">
                        Nombre
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        [(ngModel)]="nuevoNombre"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Precio
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        [(ngModel)]="nuevoPrecio"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Stock
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        [(ngModel)]="nuevoStock"
                    >

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                >
                    Cancelar
                </button>

                <button
                    class="btn btn-success"
                    (click)="agregarProducto()"
                >
                    Guardar
                </button>

            </div>

        </div>

    </div>

</div>
